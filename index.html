---
layout: default
---

<section id="intro">
    <div class="flex-row-between">
        <h1>Oxygenium's page</h1>
        <button id="theme-toggle" onclick="modeSwitcher()">
            <div></div>
        </button>
    </div>
    <p>Test Test Test <a href="https://github.com/manuelmazzuola/asko/blob/master/index.html">#Asko</a> 
    </p>
</section>

<section class="BLOG">
    <h3>#BLOG</h3>
    <ul>
        {% for post in site.posts %}
        <li>
            <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
            <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%b %d, %Y" }}</time></li>
        {% endfor %}
    </ul>
</section>
